<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EderTech | Tienda Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Orbitron', sans-serif;
            background-color: #050505;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at center, #111122 0%, #050505 100%);
        }

        .neon-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .light {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.3;
        }

        .light-1 { background: #00d4ff; top: -10%; left: -10%; }
        .light-2 { background: #ff00ff; bottom: -10%; right: -10%; }

        .container {
            text-align: center;
            padding: 50px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #00d4ff;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3), inset 0 0 15px rgba(0, 212, 255, 0.1);
            backdrop-filter: blur(10px);
            max-width: 90%;
            width: 500px;
            animation: slideUp 0.8s ease-out;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 10px #00d4ff;
        }

        p {
            color: #888;
            margin-bottom: 40px;
            font-family: sans-serif;
            letter-spacing: 1px;
        }

        .btn-store {
            text-decoration: none;
            color: #000;
            background: #00d4ff;
            padding: 20px 40px;
            font-size: 1.4rem;
            font-weight: 900;
            border-radius: 5px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            display: inline-block;
        }

        .btn-store:hover {
            transform: translateY(-5px);
            background: #fff;
            box-shadow: 0 0 40px #00d4ff;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="neon-bg">
        <div class="light light-1"></div>
        <div class="light light-2"></div>
    </div>

    <div class="container">
        <h1>¡Bienvenido a la mejor tienda!</h1>
        <p>Haz clic abajo para ver todos nuestros productos disponibles.</p>
        
        <a href="https://goo.su/vGGpZU">Ir a Tienda</a>
    </div>

</body>
</html>
